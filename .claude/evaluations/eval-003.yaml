additional_findings:
  - severity: MEDIUM
    file: "packages/promptfmt/tests/test_formatter.py"
    location: "Missing tests for FmtConfig validation"
    finding: "No test exercises FmtConfig.__post_init__ raising ValueError for invalid delimiter_style or variable_style. The validation code exists but is never tested."
    suggestion: "Add two tests: FmtConfig(delimiter_style='invalid') raises ValueError, FmtConfig(variable_style='invalid') raises ValueError."

  - severity: LOW
    file: "packages/promptfmt/promptfmt/rules/delimiters.py"
    location: "lines 8-14"
    finding: "_DELIMITER_PATTERNS list is defined but never used. The apply() function uses inline re.match() calls instead."
    suggestion: "Remove unused _DELIMITER_PATTERNS or refactor apply() to use them."

  - severity: LOW
    file: "packages/promptfmt/promptfmt/rules/wrapping.py"
    location: "lines 9-11"
    finding: "_VAR_RE and _INLINE_CODE_RE are defined but never used in any function."
    suggestion: "Remove unused regex patterns."

  - severity: LOW
    file: "packages/promptfmt/promptfmt/cli.py"
    location: "line 25"
    finding: "_FORMAT_MAP dictionary is defined but never referenced by _collect_files() or any other function."
    suggestion: "Remove _FORMAT_MAP if unused, or integrate it into _collect_files()."

  - severity: LOW
    file: "packages/promptfmt/tests/test_cli.py"
    location: "TestFormatCheck::test_check_returns_1_when_changes_needed"
    finding: "Assertion 'assert result.exit_code in (0, 1)' is too lenient. VALID_YAML has double-spaces, so formatting always produces changes -- exit code should be 1."
    suggestion: "Assert result.exit_code == 1 specifically."

