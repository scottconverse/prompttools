      - "Install command uses 'pip install prompttest-ai' (not 'prompttest')"
      - "Documents all 15 assertion types with YAML examples"
      - "Documents both CLI commands: run and init"
      - "Documents all run options: --format, --model, --fail-fast, --verbose, --pattern"
      - "Documents all three output formats: text, json, junit"
      - "Documents programmatic API usage with correct import paths"
      - "Documents exit codes: 0 (pass/no tests), 1 (failure/error), 2 (path not found)"
      - "Documents CI integration examples (GitHub Actions, GitLab CI)"
      - "Documents test file YAML format with suite, prompt, model, tests fields"
