      - "All assertion types listed in README exist in AssertionType enum"
      - "README reflects current test count in badge or description"
      - "No placeholder URLs remain"
      - "License section present"
constraints:
  - "Use Pydantic v2 BaseModel for all data classes (not v1 syntax)"
  - "Use Typer for CLI with Rich console for terminal output (match promptfmt/promptcost pattern)"
  - "Use hatchling as build backend (match existing pyproject.toml pattern)"
  - "Source layout: src/prompttest/ (not flat layout)"
  - "All imports from prompttools-core use: from prompttools_core import ..."
  - "All tests use pytest with fixtures from conftest.py (no unittest)"
  - "CLI tests use typer.testing.CliRunner"
  - "max_cost assertion uses lazy import of promptcost (optional dependency pattern)"
  - "Development Status classifier must be '4 - Beta'"
  - "Minimum 137 test cases total across all test files (currently at 137 -- do not regress)"
  - "pyproject.toml must have [project.urls] with Homepage and Repository pointing to real monorepo URL"
notes: |
  The prompttest package is ALREADY IMPLEMENTED. All source files, CLI,
  and tests exist and appear complete. This sprint is about:

  1. VERIFICATION: Run pytest and confirm all 137 tests pass. Fix any failures.
  2. GAP ANALYSIS: Compare implementation against acceptance criteria above.
     Identified gaps to fill:
     - pyproject.toml is MISSING [project.urls] section entirely (no Homepage/Repository URLs)
     - test_models.py: No tests for _validate_bounds rejecting negative values (3 tests needed)
     - test_cli.py: No test for --pattern option with custom glob
     - test_cli.py: No test for --model override via CLI
     - test_runner.py: No test for 'tests' field not being a list
     - test_runner.py: No test for invalid test entry (not a mapping)
     - --verbose flag is accepted but behavior is identical to non-verbose (flag is a no-op)
  3. HARDENING:
     - Add [project.urls] section to pyproject.toml
     - Ensure Development Status stays at '4 - Beta'
     - Confirm all exports in __init__.py match actual implementations
     - Verify README assertion count (15) matches actual enum count (15) -- CONFIRMED CORRECT
  4. E2E TESTING: Invoke prompttest run and prompttest init with real files and verify:
     - Text output is readable and correctly formatted
     - JSON output is valid and complete
     - JUnit XML output is well-formed
     - --fail-fast works correctly
     - Error cases produce clean output
     - Exit codes are correct for all scenarios

  The Builder should NOT rewrite files that are already correct.
  Only modify files where acceptance criteria are not met.