  # -- 17. TEST GAPS: FORMATS COVERAGE --
  - file: "packages/prompttools-core/tests/test_formats.py"
    description: "Direct tests for format sub-parsers (currently only tested indirectly through parse_file)."
    action: create
    acceptance:
