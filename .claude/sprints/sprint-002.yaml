      - "Tests count_file() returns same total as sum of individual msg.token_count values"
      - "Tests encoding_name property returns the encoding string passed to constructor"
      - "Minimum 19 test cases in test_tokenizer.py (currently ~12, need ~7 more)"

  # -- 16. TEST GAPS: ERRORS COVERAGE --
  - file: "packages/prompttools-core/tests/test_errors.py"
    description: "Explicit tests for the error hierarchy (currently untested as standalone file)."
    action: create
    acceptance:
      - "Tests PromptToolsError is catchable as Exception"
      - "Tests ParseError is catchable as both PromptToolsError and ValueError"
      - "Tests ConfigError is catchable as PromptToolsError but not ValueError"
      - "Tests TokenizerError is catchable as PromptToolsError"
      - "Tests ProfileNotFoundError is catchable as PromptToolsError"
      - "Tests PluginError is catchable as PromptToolsError"
      - "Tests CacheError is catchable as PromptToolsError"
      - "Tests all 7 error classes have correct __name__"
