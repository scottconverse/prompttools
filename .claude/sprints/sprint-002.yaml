      - "README mentions all suite tools: promptfmt, promptcost, prompttest, promptlint, promptdiff, promptvault"
      - "No placeholder URLs (all links are real or badge-only)"
      - "Test count is documented accurately (reflecting final count after gap closure)"
constraints:
  - "Use Pydantic v2 BaseModel for all data classes (not v1 syntax)"
  - "Use hatchling as build backend"
  - "Source layout: prompttools_core/ (flat layout, NOT src/ layout)"
  - "All tests use pytest (no unittest)"
  - "Do NOT rewrite files that already pass all acceptance criteria -- only modify where gaps exist"
  - "Minimum 120 test cases total across all test files after gap closure (currently ~99)"
  - "All existing tests must continue to pass (zero regressions)"
  - "pyproject.toml URLs must point to a real GitHub repo, not placeholders"

notes: |
  The prompttools-core package is ALREADY IMPLEMENTED and appears functional.
  This sprint is about VERIFICATION AND HARDENING, not rewriting.

  KEY FINDINGS FROM CODE REVIEW:

  1. PYPROJECT.TOML GAPS:
     - Missing [project.urls] section entirely -- no Homepage or Repository URLs
     - Development Status is correctly 4 - Beta (good)
     - Build config and deps look correct

  2. TEST GAPS IDENTIFIED:
     - No test for parse_pipeline() -- pipeline parsing is completely untested
     - No pipeline manifest fixture exists (stage-1.yaml and stage-2.yaml exist
       but no manifest.yaml)
     - No test for .yml extension alias
     - No test for parse_yaml() invalid role rejection
     - No test for parse_json() missing keys error
     - No test for markdown variable_defaults extraction     - No standalone test for error hierarchy (tested indirectly but no test_errors.py)
     - No direct test for format sub-parsers (only tested through parse_file)
     - Config tests missing: model profile resolution, tool-specific extra merge,
       invalid YAML handling, empty config file, cache section
     - Cache tests missing: TTL expiry, disk persistence across instances,
       corrupted file recovery, version mismatch handling
     - Tokenizer tests missing: provider overhead verification, invalid provider,
       encoding_name property, count_file sum consistency

  3. README CHECK:
     - Install command correctly says pip install prompttools-core-ai (good)
     - README mentions only 4 suite tools (promptfmt, promptcost, prompttest,
       promptlint) but suite has 7 packages including promptdiff and
       promptvault -- needs update
     - All API docs appear to match actual code
     - Built-in profiles table matches profiles.py (10 profiles)
     - No placeholder URLs found

  4. CODE QUALITY:
     - All models use Pydantic v2 correctly
     - Parser handles all 4 formats
     - Variable extraction covers jinja/fstring/xml
     - Cache has TTL support in code but no tests for it
     - Plugin system handles edge cases well
     - Config merging follows documented priority order

  The Builder should:
  1. Add [project.urls] to pyproject.toml
  2. Create the pipeline manifest fixture
  3. Add ~25-30 new tests across existing and new test files
  4. Update README to mention all 7 suite packages
  5. NOT rewrite any source files that already work correctly