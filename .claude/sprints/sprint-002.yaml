  # -- 18. PIPELINE MANIFEST FIXTURE --
  - file: "packages/prompttools-core/tests/fixtures/pipeline/manifest.yaml"
    description: "Pipeline manifest fixture for testing parse_pipeline()."
    action: create
    acceptance:
      - "Contains name key with a pipeline name"
      - "Contains stages list with at least 2 entries"
      - "Each stage has name and file keys"
      - "Stage file paths reference existing stage-1.yaml and stage-2.yaml"      - "At least one stage has depends_on referencing another stage"
      - "YAML parses without error"

  # -- 19. README.md --
  - file: "packages/prompttools-core/README.md"
    description: "README documentation matching actual features."
    action: modify
    acceptance:
      - "Install command uses pip install prompttools-core-ai (not prompttools-core)"
      - "API Reference lists parse_file, parse_directory, parse_stdin, parse_pipeline"
      - "API Reference lists Tokenizer, count_tokens, get_encoding"
      - "API Reference lists get_profile, list_profiles, register_profile, ModelProfile"
      - "API Reference lists load_config, find_config_file"
      - "API Reference lists PromptCache"
      - "API Reference lists discover_plugins, load_plugin"
      - "Built-in Profiles table lists all 10 profiles (not more, not fewer)"
      - "Built-in Profiles table pricing matches values in profiles.py"
      - "Supported Formats table lists .yaml, .yml, .json, .md, .txt"
      - "Error Hierarchy lists all 7 error classes"
      - "Data Models section documents PromptFile, Message, ModelProfile, ToolConfig, PromptPipeline, PipelineStage"
