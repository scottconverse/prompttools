constraints:
  - "Use Pydantic v2 BaseModel for all data classes"
  - "Use Typer for CLI with Rich console for terminal output"
  - "Use hatchling as build backend"
  - "Flat source layout: promptcost/ (not src/promptcost/)"
  - "All imports from prompttools-core use: from prompttools_core import ..."
  - "All tests use pytest (no unittest)"
  - "Development Status classifier must be 4 - Beta"
  - "Do NOT rewrite files that already meet acceptance criteria -- only modify what fails"
  - "Minimum 45 test cases total across all test files after this sprint (currently ~35)"
notes: |
  The promptcost package is ALREADY IMPLEMENTED. This sprint is verification and hardening.

  KEY ISSUES FOUND DURING ANALYSIS:

  1. MISSING DEPENDENCY: pydantic is imported in models.py but not listed in
     pyproject.toml dependencies. It works because prompttools-core likely pulls
     it in transitively, but it must be declared explicitly.

  2. MISSING URLs: pyproject.toml has no [project.urls] section. Must add
     Homepage and Repository pointing to the monorepo.

  3. NO MODEL TESTS: There is no test_models.py file. All 7 Pydantic models
     are completely untested in isolation. The models work (tested indirectly
     through estimator/budget/etc.), but there are no construction, validation,
     or serialization tests.

  4. NO PIPELINE TESTS: estimate_pipeline() has zero test coverage despite
     being exported in __init__.py and documented in README.

  5. CostDelta UNUSED IN CLI: The CostDelta model is defined in models.py and
     exported in __init__.py, but the CLI delta command constructs its values
     inline rather than using the model. Verify whether the model should be
     used or if the inline approach is intentional.

  6. CLI DIRECTORY VOLUME BUG: In cli.py lines 153-155, directory estimate with
     --project uses raw string splitting instead of calling _parse_volume().
     This means it only handles N/day format, not N/hour, N/week, or N/month.
     The Builder should fix this to use project_cost() consistently.

  7. _parse_volume INTEGER TRUNCATION: For 200/week, the calculation is
     int(200 * (1/7)) = int(28.57) = 28, which silently truncates. Consider
     whether this is acceptable or if rounding is preferred.

  The Builder should:
  - Run pytest first to see what passes and what fails
  - Fix pyproject.toml metadata issues
  - Create test_models.py with model-level tests
  - Add pipeline test coverage
  - Add CLI edge case tests
  - Fix the directory volume projection bug in cli.py
  - Update README if any features or deps change