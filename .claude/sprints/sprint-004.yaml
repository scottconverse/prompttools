  # -- 14. EXISTING TEST: CLI --
  - file: "packages/promptcost/tests/test_cli.py"
    description: "CLI tests -- needs directory estimate test, error edge cases, and negative output-tokens."
    action: modify
    acceptance:
      - "Minimum 25 test cases (currently 20)"
      - "All existing test classes and cases continue to pass"
