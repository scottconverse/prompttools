  # -- 11. EXISTING TEST: COMPARATOR --
  - file: "packages/promptcost/tests/test_comparator.py"
    description: "Tests for comparator -- needs all-unknown-models edge case."
    action: modify
    acceptance:
      - "Minimum 6 test cases (currently 5)"
      - "Tests cheapest model identification (existing)"
      - "Tests savings are positive (existing)"
      - "Tests single model comparison (existing)"
      - "Tests empty models list raises ValueError (existing)"
      - "Tests all models present in estimates dict (existing)"
      - "NEW: Tests all-unknown-models raises ValueError with descriptive message"
  # -- 12. EXISTING TEST: BUDGET --
  - file: "packages/promptcost/tests/test_budget.py"
    description: "Tests for budget -- needs empty-list edge case."
    action: modify
    acceptance:
      - "Minimum 5 test cases (currently 4)"
      - "Tests within budget (existing)"
      - "Tests over budget (existing)"
      - "Tests multiple files (existing)"
      - "Tests exact budget boundary (existing)"
