  # -- 13. EXISTING TEST: PROJECTOR --
  - file: "packages/promptcost/tests/test_projector.py"
    description: "Tests for projector -- already solid, verify completeness."
    action: modify
    acceptance:
      - "Minimum 7 test cases (currently 7)"
      - "Tests _parse_volume for day, hour, week, month"
      - "Tests _parse_volume invalid format raises ValueError"
