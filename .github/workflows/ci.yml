name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -e packages/prompttools-core
          pip install -e packages/promptcost
          pip install -e packages/promptfmt
          pip install -e packages/prompttest
          pip install -e packages/promptlint
          pip install -e packages/promptdiff
          pip install -e packages/promptvault

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy packages/ --ignore-missing-imports

      - name: Run tests
        run: pytest
