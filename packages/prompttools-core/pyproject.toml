[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "prompttools-core-ai"
version = "1.0.0"
description = "Shared foundation library for the prompttools suite"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [{ name = "Scott Converse" }]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "tiktoken>=0.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
    "ruff",
    "mypy",
]

[project.urls]
Homepage = "https://github.com/scottconverse/prompttools"
Repository = "https://github.com/scottconverse/prompttools"

[tool.hatch.build.targets.wheel]
packages = ["prompttools_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.ruff]
target-version = "py39"
line-length = 100
